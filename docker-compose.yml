#docker-compose.yml
version: '3.9'

services:
  backend:
    build: ./server
    container_name: hostel-backend
    env_file:
      - ./server/.env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy


  postgres:
    image: postgres:15-alpine
    container_name: hostel-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=hostel-db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 4s
      timeout: 3s
      retries: 3
